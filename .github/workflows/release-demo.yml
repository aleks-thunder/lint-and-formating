name: Demo semantic-release dry run

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/base
          - packages/angular
          - packages/react

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@aleks-thunder"
          cache: npm

      - name: Require NPM_TOKEN for GitHub Packages
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty."
            exit 1
          fi

      - name: Configure npm auth for GitHub Packages
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm config set //npm.pkg.github.com/:_authToken "${NPM_TOKEN}"

      - name: Install dependencies
        run: npm install

      - name: semantic-release dry run
        working-directory: ${{ matrix.package_dir }}
        run: node ../../node_modules/semantic-release/bin/semantic-release.js --dry-run
